<!DOCTYPE html>
<html>

<head>
    <title>Data Siswa</title>
    <link rel="stylesheet" href="CRUD.css">
</head>

<body>

    <h2>masukan data siswa</h2>

    Nama: <input type="text" id="nama">
    Kelas: <input type="text" id="kelas">
    Nilai: <input type="number" id="nilai">

    <button onclick="tambah()">Tambah</button>
    <button onclick="update()">Update</button>

    <h2>Daftar Siswa</h2>

    <table border="1">
        <thead>
            <tr>
                <th>Nama</th>
                <th>Kelas</th>
                <th>Nilai</th>
                <th>Status</th>
                <th>Grade</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="output"></tbody>
    </table>

    <script>

        let data = [];
        let editIndex = -1;

        function tambah() {

            let nama = document.getElementById("nama").value;
            let kelas = document.getElementById("kelas").value;
            let nilai = document.getElementById("nilai").value;

            if (nama == "" || kelas == "" || nilai == "") {
                alert("Harus diisi semua");
                return;
            }

            data.push({
                nama: nama,
                kelas: kelas,
                nilai: Number(nilai)
            });

            tampil();
            kosongkan();
        }

        function tampil() {

            let out = document.getElementById("output");
            out.innerHTML = "";

            data.forEach(function (siswa, i) {

                let status;
                let grade;

                if (siswa.nilai >= 75) {
                    status = "Lulus";
                } else {
                    status = "Tidak Lulus";
                }

                if (siswa.nilai >= 90) {
                    grade = "A";
                } else if (siswa.nilai >= 80) {
                    grade = "B";
                } else if (siswa.nilai >= 75) {
                    grade = "C";
                } else {
                    grade = "D";
                }

                out.innerHTML +=
                    "<tr>" +
                    "<td>" + siswa.nama + "</td>" +
                    "<td>" + siswa.kelas + "</td>" +
                    "<td>" + siswa.nilai + "</td>" +
                    "<td>" + status + "</td>" +
                    "<td>" + grade + "</td>" +
                    "<td>" +
                    "<button onclick='edit(" + i + ")'>Edit</button> " +
                    "<button onclick='hapus(" + i + ")'>Hapus</button>" +
                    "</td>" +
                    "</tr>";
            });
        }

        function edit(i) {

            document.getElementById("nama").value = data[i].nama;
            document.getElementById("kelas").value = data[i].kelas;
            document.getElementById("nilai").value = data[i].nilai;

            editIndex = i;
        }

        function update() {

            if (editIndex == -1) {
                alert("Pilih data dulu");
                return;
            }

            data[editIndex].nama = document.getElementById("nama").value;
            data[editIndex].kelas = document.getElementById("kelas").value;
            data[editIndex].nilai = Number(document.getElementById("nilai").value);

            tampil();
            kosongkan();

            editIndex = -1;
        }

        function hapus(i) {

            data.splice(i, 1);
            tampil();
        }

        function kosongkan() {

            document.getElementById("nama").value = "";
            document.getElementById("kelas").value = "";
            document.getElementById("nilai").value = "";
        }

    </script>

</body>

</html>
